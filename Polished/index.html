<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Polished Todo</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="app">
    <div class="header">
      <div>
        <h1>To-Do List</h1>
        <p class="subtitle">Final version: add, complete, delete, filter, and save tasks.</p>
      </div>
      <div id="stats" class="stats">0 total • 0 active • 0 done</div>
    </div>

    <form id="todoForm" class="input-row">
      <input id="todoInput" type="text" placeholder="What do you want to get done?" autocomplete="off" />
      <button class="add-btn" type="submit">Add Task</button>
    </form>

    <div class="toolbar">
      <div class="filters">
        <button type="button" class="filter-btn active" data-filter="all">All</button>
        <button type="button" class="filter-btn" data-filter="active">Not Completed</button>
        <button type="button" class="filter-btn" data-filter="completed">Completed</button>
      </div>
      <button id="clearCompletedBtn" type="button" class="clear-btn">Clear Completed</button>
    </div>

    <ul id="todoList"></ul>
    <p id="emptyState" class="empty">No tasks to show. Add a new one above.</p>
  </main>

  <script src="./script.js"></script>
</body>
</html>
